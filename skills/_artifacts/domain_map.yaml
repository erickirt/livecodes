  - name: 'Use Framework SDK Wrappers'
    slug: 'framework-wrappers'
    domain: 'sdk-embedding'
    description: 'Use SDK with React, Vue, Svelte, Solid, Preact, or Web Components'
    type: 'framework'
    covers:
      - 'React SDK usage'
      - 'Vue SDK usage'
      - 'Svelte SDK usage'
      - 'Solid SDK usage'
      - 'Preact SDK usage'
      - 'Web Components SDK usage'
      - 'sdkReady/slotReady callback pattern'
    tasks:
      - 'Add LiveCodes to a React app'
      - 'Add LiveCodes to a Vue app'
      - 'Use SDK methods from React/Vue components'
      - 'Handle reactive prop updates'
    failure_modes:
      - mistake: 'Not using sdkReady to access SDK methods in frameworks'
        mechanism: 'SDK methods are only available after playground initializes; use sdkReady callback (React) or slotReady/slot (Vue)'
        wrong_pattern: |
          // React - SDK not available on first render
          const Playground = () => {
            const playground = ???; // No way to get SDK reference
            return <LiveCodes config={config} />;
          };
        correct_pattern: |
          // React - use sdkReady callback
          const Playground = () => {
            const [playground, setPlayground] = useState(null);
            return (
              <>
                <LiveCodes config={config} sdkReady={setPlayground} />
                <button onClick={() => playground?.run()}>Run</button>
              </>
            );
          };

          // Vue - use @sdk-ready event
          <LiveCodes :config="config" @sdk-ready="onReady" />
        source: 'Documentation: sdk/react.mdx, sdk/vue.mdx'
        priority: 'HIGH'
        status: 'active'
        skills: ['framework-wrappers', 'sdk-methods']

      - mistake: 'Changing non-config props causes full reload'
        mechanism: 'Only config prop changes use setConfig (no reload); other prop changes destroy and recreate playground'
        correct_pattern: |
          // React - config changes use setConfig (efficient)
          const [config, setConfig] = useState(initialConfig);
          // This updates playground without reload:
          setConfig(newConfig);

          // But changing other props (template, params) causes reload:
          // <LiveCodes template={template} /> // changing template reloads
        source: 'Documentation: sdk/react.mdx - Reactive Props section'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['framework-wrappers']

