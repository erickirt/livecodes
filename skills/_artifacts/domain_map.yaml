  - name: 'Resolve Modules'
    slug: 'module-resolution'
    domain: 'languages'
    description: 'Import npm, deno.land/x, jsr, and GitHub modules without build steps using automatic CDN resolution'
    type: 'core'
    covers:
      - 'Bare module imports'
      - 'CDN providers (esm.sh, skypack, jsdelivr, unpkg, etc.)'
      - 'Deno modules (.ts imports)'
      - 'JSR modules (jsr: prefix)'
      - 'GitHub/GitLab imports'
      - 'Custom import maps'
      - '#nobundle for external modules'
    tasks:
      - 'Import an npm package in playground'
      - 'Use a specific package version'
      - 'Import from Deno or GitHub'
      - 'Configure custom CDN'
      - 'Create custom import maps'
    failure_modes:
      - mistake: 'Importing same module from different CDNs causes conflicts'
        mechanism: 'Module instances from different CDNs are separate; React from esm.sh !== React from skypack'
        wrong_pattern: |
          import React from 'react';              // defaults to esm.sh
          import { createRoot } from 'skypack:react-dom/client'; // Different React!
        correct_pattern: |
          // Always use same CDN or explicit prefix:
          import React from 'react';
          import { createRoot } from 'react-dom/client';
          // OR explicitly:
          import React from 'esm.sh:react';
          import { createRoot } from 'esm.sh:react-dom/client';
        source: 'Documentation: module-resolution.mdx - CDN Providers caution'
        priority: 'HIGH'
        status: 'active'
        skills: ['module-resolution']

      - mistake: 'CommonJS require not converted to ESM'
        mechanism: 'LiveCodes converts require to ESM imports automatically, but explicit ESM imports are preferred'
        correct_pattern: |
          // Works but not recommended:
          const { v4 } = require('uuid');

          // Preferred:
          import { v4 } from 'uuid';
        source: 'Documentation: module-resolution.mdx - CommonJS Modules'
        priority: 'LOW'
        status: 'active'
        skills: ['module-resolution']

      - mistake: 'Not using #nobundle for pre-bundled imports'
        mechanism: 'Some imports (like GitHub/Deno) are automatically bundled; #nobundle skips bundling when not needed'
        correct_pattern: |
          // Use #nobundle when you want the original URL:
          import { flatten } from 'https://github.com/remeda/remeda/blob/master/src/flatten.ts#nobundle';

          // Without #nobundle, the import gets bundled with esbuild
        source: 'Documentation: module-resolution.mdx - GitHub/GitLab/Bitbucket section'
        priority: 'LOW'
        status: 'active'
        skills: ['module-resolution']

