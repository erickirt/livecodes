      - 'Configure via URL parameters'
    subsystems:
      - name: 'Content Config'
        config_surface: 'title, description, head, markup, style, script, tests'
      - name: 'Editor Config'
        config_surface: 'theme, editorTheme, fontFamily, fontSize, useTabs, tabSize, lineNumbers'
      - name: 'App Config'
        config_surface: 'readonly, allowLangChange, view, mode, tools, zoom'
      - name: 'User Config'
        config_surface: 'autoupdate, autosave, delay, formatOnsave, layout'
    failure_modes:
      - mistake: 'Confusion between Config and EmbedOptions'
        mechanism: 'Config is for project content; EmbedOptions is for SDK/embed settings'
        wrong_pattern: |
          createPlayground('#container', {
            config: {
              appUrl: 'https://my-server.com', // Wrong: appUrl belongs in EmbedOptions, not Config
            },
          });
        correct_pattern: |
          createPlayground('#container', {
            appUrl: 'https://my-server.com', // EmbedOptions (outer level)
            config: {                         // Config (inner level)
              markup: { language: 'html', content: '<h1>Hello</h1>' },
            },
          });
        source: 'Documentation: sdk/js-ts.mdx - EmbedOptions vs Config distinction'
        priority: 'HIGH'
        status: 'active'
        skills: ['configuration', 'sdk-embedding']

      - mistake: 'Overriding Config with params creates precedence confusion'
        mechanism: 'Query params override config object when both are provided'
        wrong_pattern: |
          createPlayground('#container', {
            config: { markup: { language: 'html', content: '<h1>A</h1>' } },
            params: { html: '<h1>B</h1>' }, // params overrides config!
          });
        correct_pattern: |
          // Use one or the other, or understand precedence:
          // params > config > template (lowest precedence)
          createPlayground('#container', {
            params: { html: '<h1>B</h1>' }, // Just params
          });
        source: 'Documentation: sdk/js-ts.mdx - Multiple Sources section'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['configuration']

      - mistake: 'Incorrect editor language name or alias'
        mechanism: 'Language names, extensions, and aliases must match supported values; typos cause fallback to default'
        wrong_pattern: |
          config: {
            script: { language: 'react.js', content: '...' }, // Wrong format
          }
        correct_pattern: |
          config: {
            script: { language: 'react', content: '...' }, // or 'jsx', 'react-jsx'
          }
        source: 'Source code: models.ts Language type and docs languages/index.mdx'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['configuration', 'language-support']

