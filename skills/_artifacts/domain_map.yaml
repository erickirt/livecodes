skills:
  - name: 'Create Embedded Playground'
    slug: 'sdk-embedding'
    domain: 'sdk-embedding'
    description: 'Create and configure embedded playgrounds using the SDK with createPlayground(), container setup, and embed options'
    type: 'core'
    covers:
      - 'createPlayground function'
      - 'EmbedOptions interface'
      - 'Container element setup'
      - 'Loading modes (eager, lazy, click)'
      - 'appUrl for self-hosted instances'
    tasks:
      - 'Create a basic embedded playground'
      - 'Configure loading behavior'
      - 'Use a self-hosted LiveCodes instance'
      - 'Set up playground with template or config'
    failure_modes:
      - mistake: 'Container element not found throws error'
        mechanism: 'createPlayground throws if the container CSS selector is not found (except in headless mode)'
        wrong_pattern: |
          createPlayground('#nonexistent-container', { config });
        correct_pattern: |
          // Ensure container exists before calling createPlayground
          const container = document.querySelector('#container');
          if (container) {
            createPlayground('#container', { config });
          }
        source: 'Source code: sdk/index.ts throws if container not found'
        priority: 'HIGH'
        status: 'active'
        skills: ['sdk-embedding']

      - mistake: 'Invalid appUrl throws error'
        mechanism: 'Invalid URL passed to appUrl embed option causes createPlayground to reject'
        wrong_pattern: |
          createPlayground('#container', { appUrl: 'not-a-url' });
        correct_pattern: |
          createPlayground('#container', {
            appUrl: 'https://livecodes.io'
          });
          // Or for self-hosted:
          createPlayground('#container', {
            appUrl: 'https://my-server.com/livecodes/'
          });
        source: 'Source code: sdk/index.ts validates URL'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['sdk-embedding']

      - mistake: 'Calling SDK methods after destroy() throws error'
        mechanism: 'Once destroy() is called, all subsequent SDK method calls throw with error message'
        wrong_pattern: |
          const playground = await createPlayground('#container', options);
          await playground.destroy();
          await playground.run(); // throws!
        correct_pattern: |
          const playground = await createPlayground('#container', options);
          // Use SDK methods...
          await playground.run();
          // Destroy when done - no more method calls after this
          await playground.destroy();
        source: 'Source code: sdk/index.ts checks destroyed flag'
        priority: 'HIGH'
        status: 'active'
        skills: ['sdk-embedding', 'sdk-methods']

      - mistake: 'SDK method timeout after 60 seconds'
        mechanism: 'SDK calls have a 60-second timeout; slow playground loads or infinite loops cause timeout'
        wrong_pattern: |
          // Playground takes too long to load or code has infinite loop
          await playground.run(); // may timeout
        correct_pattern: |
          // Handle potential timeouts with try/catch
          try {
            await playground.run();
          } catch (error) {
            console.error('SDK call timed out or failed:', error);
          }
        source: 'Source code: API_TIMEOUT = 60000 in sdk/index.ts'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['sdk-embedding', 'sdk-methods']

  - name: 'Use SDK Methods'
    slug: 'sdk-methods'
    domain: 'sdk-embedding'
    description: 'Use SDK methods to interact with playgrounds: getCode, setConfig, run, format, watch, runTests, getShareUrl'
    type: 'core'
    covers:
      - 'run() method'
      - 'format() method'
      - 'getCode() method'
      - 'setConfig() method'
      - 'getConfig() method'
      - 'getShareUrl() method'
      - 'watch() event subscription'
      - 'runTests() method'
      - 'show() method'
      - 'exec() method'
      - 'destroy() method'
    tasks:
      - 'Get current code from playground'
      - 'Update playground configuration'
      - 'React to code changes'
      - 'Run tests programmatically'
      - 'Share playground via URL'
      - 'Show specific editor or panel'
    failure_modes:
      - mistake: 'Not awaiting async SDK methods'
        mechanism: 'All SDK methods return Promises; not awaiting leads to race conditions'
        wrong_pattern: |
          const code = playground.getCode();
          console.log(code); // Promise object, not code
        correct_pattern: |
          const code = await playground.getCode();
          console.log(code.markup.content);
        source: 'Documentation: sdk/js-ts.mdx'
        priority: 'HIGH'
        status: 'active'
        skills: ['sdk-methods']

      - mistake: 'watch() callback receives undefined data'
        mechanism: 'The watch callback receives data object with specific structure depending on event type'
        wrong_pattern: |
          playground.watch('code', (data) => {
            console.log(data); // may not match expected structure
          });
        correct_pattern: |
          playground.watch('code', ({ code, config }) => {
            // code has markup, style, script, result properties
            // each editor has content, language, compiled properties
            console.log(code.markup.compiled);
          });

          playground.watch('console', ({ method, args }) => {
            console[method](...args);
          });
        source: 'Documentation: sdk/js-ts.mdx watch section'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['sdk-methods']

      - mistake: 'Using onChange instead of watch'
        mechanism: 'onChange is deprecated; watch is the current method for event subscription'
        wrong_pattern: |
          playground.onChange(({ code, config }) => {
            // deprecated method
          });
        correct_pattern: |
          const watcher = playground.watch('code', ({ code, config }) => {
            console.log('code changed');
          });
          // later, to stop watching:
          watcher.remove();
        source: 'Source code: sdk/index.ts - onChange marked as deprecated'
        priority: 'LOW'
        status: 'active'
        skills: ['sdk-methods']

