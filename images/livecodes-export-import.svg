<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 680" width="1120" height="680" role="img" aria-label="LiveCodes export and import workflow">
  <defs>
    <linearGradient id="ei-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1220"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <linearGradient id="ei-center-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1825"/>
      <stop offset="100%" stop-color="#080d16"/>
    </linearGradient>
    <linearGradient id="ei-import-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111c2e"/>
      <stop offset="100%" stop-color="#0c1422"/>
    </linearGradient>
    <linearGradient id="ei-export-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2c"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <filter id="ei-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feFlood flood-color="#00c8ff" flood-opacity=".3" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ei-dot-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#ff4d4d" flood-opacity=".7" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ei-center-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feFlood flood-color="#00c8ff" flood-opacity=".18" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ei-arrow-in" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(0,200,255,0.6)"/>
    </marker>
    <marker id="ei-arrow-out" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(0,229,200,0.6)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1120" height="680" fill="url(#ei-bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="0" y1="85" x2="1120" y2="85"/>
    <line x1="0" y1="170" x2="1120" y2="170"/>
    <line x1="0" y1="255" x2="1120" y2="255"/>
    <line x1="0" y1="340" x2="1120" y2="340"/>
    <line x1="0" y1="425" x2="1120" y2="425"/>
    <line x1="0" y1="510" x2="1120" y2="510"/>
    <line x1="0" y1="595" x2="1120" y2="595"/>
    <line x1="140" y1="0" x2="140" y2="680"/>
    <line x1="280" y1="0" x2="280" y2="680"/>
    <line x1="420" y1="0" x2="420" y2="680"/>
    <line x1="560" y1="0" x2="560" y2="680"/>
    <line x1="700" y1="0" x2="700" y2="680"/>
    <line x1="840" y1="0" x2="840" y2="680"/>
    <line x1="980" y1="0" x2="980" y2="680"/>
  </g>

  <!-- Title -->
  <text x="560" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="0">Import &amp; Export Workflow</text>
  <line x1="400" y1="68" x2="720" y2="68" stroke="rgba(0,200,255,0.3)" stroke-width="1"/>

  <!-- ─── IMPORT SECTION LABEL ─── -->
  <text x="188" y="108" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(0,200,255,0.7)" text-anchor="middle" letter-spacing="2">IMPORT FROM</text>

  <!-- ─── IMPORT CARDS ─── -->

  <!-- CodePen -->
  <rect x="50" y="124" width="276" height="70" rx="10" fill="url(#ei-import-card)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <circle cx="88" cy="159" r="18" fill="rgba(71,207,115,0.12)" stroke="rgba(71,207,115,0.4)" stroke-width="1.5"/>
  <text x="88" y="164" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#47cf73" text-anchor="middle">CP</text>
  <text x="116" y="152" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">CodePen</text>
  <text x="116" y="172" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Pen URL or ID</text>

  <!-- GitHub Gist -->
  <rect x="50" y="210" width="276" height="70" rx="10" fill="url(#ei-import-card)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <circle cx="88" cy="245" r="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="88" y="250" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.8)" text-anchor="middle">GH</text>
  <text x="116" y="238" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">GitHub Gist</text>
  <text x="116" y="258" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Public or secret gist</text>

  <!-- URL / CDN -->
  <rect x="50" y="296" width="276" height="70" rx="10" fill="url(#ei-import-card)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <circle cx="88" cy="331" r="18" fill="rgba(0,200,255,0.1)" stroke="rgba(0,200,255,0.4)" stroke-width="1.5"/>
  <text x="88" y="337" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#00c8ff" text-anchor="middle">URL</text>
  <text x="116" y="324" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">URL / CDN</text>
  <text x="116" y="344" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Direct link to code file</text>

  <!-- JSFiddle -->
  <rect x="50" y="382" width="276" height="70" rx="10" fill="url(#ei-import-card)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <circle cx="88" cy="417" r="18" fill="rgba(70,130,230,0.12)" stroke="rgba(70,130,230,0.4)" stroke-width="1.5"/>
  <text x="88" y="422" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#4682e6" text-anchor="middle">JF</text>
  <text x="116" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">JSFiddle</text>
  <text x="116" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Fiddle URL or ID</text>

  <!-- Local File -->
  <rect x="50" y="468" width="276" height="70" rx="10" fill="url(#ei-import-card)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <circle cx="88" cy="503" r="18" fill="rgba(255,200,50,0.08)" stroke="rgba(255,200,50,0.35)" stroke-width="1.5"/>
  <text x="88" y="509" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17" fill="rgba(255,200,50,0.8)" text-anchor="middle">📁</text>
  <text x="116" y="496" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">Local File</text>
  <text x="116" y="516" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">HTML, JS, CSS, or JSON</text>

  <!-- Template -->
  <rect x="50" y="554" width="276" height="70" rx="10" fill="url(#ei-import-card)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <circle cx="88" cy="589" r="18" fill="rgba(0,229,200,0.1)" stroke="rgba(0,229,200,0.35)" stroke-width="1.5"/>
  <text x="88" y="595" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#00e5c8" text-anchor="middle">⊞</text>
  <text x="116" y="582" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">Starter Template</text>
  <text x="116" y="602" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Framework starters</text>

  <!-- ─── IMPORT ARROWS ─── -->
  <line x1="327" y1="159" x2="406" y2="300" stroke="rgba(0,200,255,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-in)"/>
  <line x1="327" y1="245" x2="406" y2="320" stroke="rgba(0,200,255,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-in)"/>
  <line x1="327" y1="331" x2="406" y2="340" stroke="rgba(0,200,255,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-in)"/>
  <line x1="327" y1="417" x2="406" y2="360" stroke="rgba(0,200,255,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-in)"/>
  <line x1="327" y1="503" x2="406" y2="378" stroke="rgba(0,200,255,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-in)"/>
  <line x1="327" y1="589" x2="406" y2="394" stroke="rgba(0,200,255,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-in)"/>

  <!-- ─── CENTER: LIVECODES ─── -->
  <rect x="400" y="240" width="320" height="200" rx="20" fill="url(#ei-center-bg)" stroke="rgba(0,200,255,0.35)" stroke-width="1.5" filter="url(#ei-center-glow)"/>
  <!-- Icon -->
  <rect x="430" y="274" width="80" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(0,200,255,0.15)" stroke-width="1"/>
  <g filter="url(#ei-glow)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="452,302 441,314 452,326" stroke="#00c8ff" stroke-width="7"/>
    <line x1="476" y1="298" x2="459" y2="332" stroke="#00e5c8" stroke-width="7"/>
    <polyline points="486,302 497,314 486,326" stroke="#00c8ff" stroke-width="7"/>
  </g>
  <circle cx="490" cy="287" r="5" fill="#ff4d4d" filter="url(#ei-dot-glow)"/>
  <!-- Wordmark -->
  <text x="524" y="302" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-0.5">LiveCodes</text>
  <text x="524" y="328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(0,200,255,0.7)">Browser-based playground</text>
  <!-- Tagline -->
  <text x="560" y="404" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.35)" text-anchor="middle">livecodes.io</text>

  <!-- ─── EXPORT SECTION LABEL ─── -->
  <text x="932" y="108" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(0,229,200,0.7)" text-anchor="middle" letter-spacing="2">EXPORT TO</text>

  <!-- ─── EXPORT ARROWS ─── -->
  <line x1="714" y1="300" x2="793" y2="159" stroke="rgba(0,229,200,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-out)"/>
  <line x1="714" y1="320" x2="793" y2="245" stroke="rgba(0,229,200,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-out)"/>
  <line x1="714" y1="340" x2="793" y2="331" stroke="rgba(0,229,200,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-out)"/>
  <line x1="714" y1="360" x2="793" y2="417" stroke="rgba(0,229,200,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-out)"/>
  <line x1="714" y1="378" x2="793" y2="503" stroke="rgba(0,229,200,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-out)"/>
  <line x1="714" y1="394" x2="793" y2="589" stroke="rgba(0,229,200,0.35)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ei-arrow-out)"/>

  <!-- ─── EXPORT CARDS ─── -->

  <!-- GitHub Gist -->
  <rect x="794" y="124" width="276" height="70" rx="10" fill="url(#ei-export-card)" stroke="rgba(0,229,200,0.2)" stroke-width="1"/>
  <circle cx="832" cy="159" r="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="832" y="164" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.8)" text-anchor="middle">GH</text>
  <text x="860" y="152" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">GitHub Gist</text>
  <text x="860" y="172" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Save as public or secret</text>

  <!-- CodePen -->
  <rect x="794" y="210" width="276" height="70" rx="10" fill="url(#ei-export-card)" stroke="rgba(0,229,200,0.2)" stroke-width="1"/>
  <circle cx="832" cy="245" r="18" fill="rgba(71,207,115,0.12)" stroke="rgba(71,207,115,0.4)" stroke-width="1.5"/>
  <text x="832" y="250" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#47cf73" text-anchor="middle">CP</text>
  <text x="860" y="238" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">CodePen</text>
  <text x="860" y="258" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Open in new Pen</text>

  <!-- JSFiddle -->
  <rect x="794" y="296" width="276" height="70" rx="10" fill="url(#ei-export-card)" stroke="rgba(0,229,200,0.2)" stroke-width="1"/>
  <circle cx="832" cy="331" r="18" fill="rgba(70,130,230,0.12)" stroke="rgba(70,130,230,0.4)" stroke-width="1.5"/>
  <text x="832" y="337" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#4682e6" text-anchor="middle">JF</text>
  <text x="860" y="324" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">JSFiddle</text>
  <text x="860" y="344" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Open in new fiddle</text>

  <!-- JSON / Share URL -->
  <rect x="794" y="382" width="276" height="70" rx="10" fill="url(#ei-export-card)" stroke="rgba(0,229,200,0.2)" stroke-width="1"/>
  <circle cx="832" cy="417" r="18" fill="rgba(0,200,255,0.1)" stroke="rgba(0,200,255,0.4)" stroke-width="1.5"/>
  <text x="832" y="422" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#00c8ff" text-anchor="middle">URL</text>
  <text x="860" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">Share URL</text>
  <text x="860" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Embed or shareable link</text>

  <!-- Zip File -->
  <rect x="794" y="468" width="276" height="70" rx="10" fill="url(#ei-export-card)" stroke="rgba(0,229,200,0.2)" stroke-width="1"/>
  <circle cx="832" cy="503" r="18" fill="rgba(255,200,50,0.08)" stroke="rgba(255,200,50,0.35)" stroke-width="1.5"/>
  <text x="832" y="509" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17" fill="rgba(255,200,50,0.8)" text-anchor="middle">↓</text>
  <text x="860" y="496" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">Download ZIP</text>
  <text x="860" y="516" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">HTML, JS, CSS as files</text>

  <!-- JSON Config -->
  <rect x="794" y="554" width="276" height="70" rx="10" fill="url(#ei-export-card)" stroke="rgba(0,229,200,0.2)" stroke-width="1"/>
  <circle cx="832" cy="589" r="18" fill="rgba(0,229,200,0.1)" stroke="rgba(0,229,200,0.35)" stroke-width="1.5"/>
  <text x="832" y="594" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#00e5c8" text-anchor="middle">{ }</text>
  <text x="860" y="582" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.85)">JSON Config</text>
  <text x="860" y="602" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)">Portable project config</text>

  <!-- Bottom note -->
  <text x="560" y="648" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.2)" text-anchor="middle">All processing runs in the browser — no server required</text>
</svg>
