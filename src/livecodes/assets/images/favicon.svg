<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description><dc:creator>RealFaviconGenerator</dc:creator><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description></rdf:RDF></metadata><defs>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1825"></stop>
      <stop offset="100%" stop-color="#080d16"></stop>
    </linearGradient>

    <!-- Subtle dot texture -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r=".75" fill="rgba(255,255,255,.04)"></circle>
    </pattern>

    <!-- Cyan glow on the </> glyph -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"></feGaussianBlur>
      <feFlood flood-color="#00c8ff" flood-opacity=".32" result="c"></feFlood>
      <feComposite in="c" in2="b" operator="in" result="cb"></feComposite>
      <feMerge>
        <feMergeNode in="cb"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Red glow on the live dot -->
    <filter id="dot-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="7" result="b"></feGaussianBlur>
      <feFlood flood-color="#ff4d4d" flood-opacity=".7" result="c"></feFlood>
      <feComposite in="c" in2="b" operator="in" result="cb"></feComposite>
      <feMerge>
        <feMergeNode in="cb"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

  </defs><rect width="512" height="512" rx="80" fill="url(#bg)"></rect><rect width="512" height="512" rx="80" fill="url(#dots)"></rect><g filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="146,176 86,256 146,336" stroke="#00c8ff" stroke-width="44"></polyline>
    <line x1="310" y1="160" x2="202" y2="352" stroke="#00e5c8" stroke-width="44"></line>
    <polyline points="366,176 426,256 366,336" stroke="#00c8ff" stroke-width="44"></polyline>
  </g><circle cx="395" cy="100" r="26" fill="#ff4d4d" filter="url(#dot-glow)"></circle></svg>