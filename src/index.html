<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Tags -->
    <title>LiveCodes</title>
    <meta name="title" content="LiveCodes" />
    <meta name="description" content="A Code Playground That Just Works!" />

    <!-- Twitter -->
    <meta property="twitter:title" content="LiveCodes" />
    <meta property="twitter:description" content="A Code Playground That Just Works!" />
    <meta
      property="twitter:image"
      content="https://livecodes.io/livecodes/assets/images/open-graph.png"
    />
    <meta property="twitter:url" content="https://livecodes.io/" />
    <meta property="twitter:card" content="summary_large_image" />

    <!-- Facebook -->
    <meta property="og:title" content="LiveCodes" />
    <meta property="og:description" content="A Code Playground That Just Works!" />
    <meta property="og:url" content="https://livecodes.io/" />
    <meta
      property="og:image"
      content="https://livecodes.io/livecodes/assets/images/open-graph.png"
    />
    <meta property="og:type" content="website" />

    <!-- oEmbed -->
    <link
      rel="alternate"
      type="application/json+oembed"
      href="oembed?url=https%3A%2F%2Flivecodes.io&format=json"
      title="LiveCodes"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="livecodes/assets/images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="livecodes/assets/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="livecodes/assets/images/favicon-16x16.png"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="livecodes/assets/site.webmanifest" />
    <link rel="mask-icon" href="livecodes/assets/images/safari-pinned-tab.svg" color="#5bbad5" />
    <meta content="LiveCodes" name="apple-mobile-web-app-title" />
    <meta content="LiveCodes" name="application-name" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="msapplication-config" content="livecodes/assets/browserconfig.xml" />
    <meta name="theme-color" content="#0d1825" />
    <!-- index.css -->
  </head>
  <body>
    <div id="livecodes"></div>
    <div id="loading">
      <div class="logo-wrapper">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 512 512"
          role="img"
          aria-label="LiveCodes loading icon"
        >
          <defs>
            <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
              <circle cx="1" cy="1" r=".75" fill="rgba(255,255,255,.04)" />
            </pattern>
            <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="8" result="b" />
              <feMerge>
                <feMergeNode in="b" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
            <filter id="dot-glow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="4" result="b" />
              <feMerge>
                <feMergeNode in="b" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <!-- Master group fades out at the end of each cycle -->
          <g>
            <animate
              attributeName="opacity"
              values="1;1;0;0"
              keyTimes="0;0.767;0.933;1"
              dur="5s"
              repeatCount="indefinite"
              fill="freeze"
            />
            <rect width="512" height="512" rx="80" fill="url(#dots)" />
            <!-- Strokes -->
            <g filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round" fill="none">
              <!-- Left bracket -->
              <path
                d="M146 176 L86 256 L146 336"
                stroke="#00c8ff"
                stroke-width="44"
                pathLength="1"
                stroke-dasharray="1"
                stroke-dashoffset="1"
              >
                <animate
                  attributeName="stroke-dashoffset"
                  values="1;0;0;1"
                  keyTimes="0;0.167;0.95;1"
                  dur="5s"
                  repeatCount="indefinite"
                  fill="freeze"
                />
              </path>
              <!-- Slash -->
              <path
                d="M310 160 L202 352"
                stroke="#00e5c8"
                stroke-width="44"
                pathLength="1"
                stroke-dasharray="1"
                stroke-dashoffset="1"
              >
                <animate
                  attributeName="stroke-dashoffset"
                  values="1;1;0;0;1"
                  keyTimes="0;0.167;0.333;0.95;1"
                  dur="5s"
                  repeatCount="indefinite"
                  fill="freeze"
                />
              </path>
              <!-- Right bracket -->
              <path
                d="M366 176 L426 256 L366 336"
                stroke="#00c8ff"
                stroke-width="44"
                pathLength="1"
                stroke-dasharray="1"
                stroke-dashoffset="1"
              >
                <animate
                  attributeName="stroke-dashoffset"
                  values="1;1;0;0;1"
                  keyTimes="0;0.333;0.5;0.95;1"
                  dur="5s"
                  repeatCount="indefinite"
                  fill="freeze"
                />
              </path>
            </g>
            <!-- Live dot -->
            <g filter="url(#dot-glow)">
              <circle cx="395" cy="100" r="26" fill="#ff4d4d" opacity="0">
                <!-- Fade-in + opacity pulse -->
                <animate
                  attributeName="opacity"
                  values="0;0;1;0.8;1;0.8;1"
                  keyTimes="0;0.5;0.567;0.667;0.767;0.867;1"
                  dur="5s"
                  repeatCount="indefinite"
                  fill="freeze"
                />
                <!-- Radius pulse (breathing effect) -->
                <animate
                  attributeName="r"
                  values="20;22;26;26;26;30;26"
                  keyTimes="0;0.5;0.567;0.667;0.767;0.867;1"
                  dur="5s"
                  repeatCount="indefinite"
                  fill="freeze"
                />
              </circle>
            </g>
          </g>
        </svg>
      </div>

      <div id="loading-text" hidden>Loading LiveCodes…</div>
      <noscript><div class="noscript">Please enable JavaScript to use LiveCodes</div></noscript>
      <script>
        document.querySelector('#loading-text').hidden = false;
      </script>
    </div>
    <script src="livecodes/{{hash:index.js}}"></script>
  </body>
</html>
